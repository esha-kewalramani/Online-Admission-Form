<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" 
  content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="form.css">
  <title>Document</title>
</head>
<body>
 <h1>Online Admission Form</h1>
 <div class="container">
  <form action="table.html" method="post">
    <fieldset>
    <legend>Personal Information</legend>
    <div class="form-group">
    <label for="F">Full Name:</label>
   <input type="text" name="Full Name" id="F" placeholder="Enter Your Name Here">
    </div>
    <br>
    <div class="form-group">
    <label for="E">Email:</label>
    <input type="email" name="Email" id="E" placeholder="Enter your email here">
    </div>
    <br>
    <div class="form-group">
    <label for="P">Phone:</label>
    <input type="number" name="Phone" id="P" placeholder="Enter your phone number">
      </div>
      <br>
      <div class="form-group">
    <label for="D">Date Of Birth:</label>
    <input type="date" name="Date Of Birth:" id="D" placeholder="select date">
    </div>
    <br>
    </fieldset>
     <fieldset>
     <legend>Academic Information</legend>
     <div class="form-group">
      <label for="C">course:</label>
     <select name="course" id="C">
      <option value="">Select course</option>
      <option value="D.I.T">D.I.T</option>
      <option value="C.I.T">C.I.T</option>
      <option value="Web development">web development</option>
        <option value="SQL">SQL</option>
      <option value="stitching">stitching</option>
      <option value="Makeup">Makeup</option>
      <option value="Graphic designing">Graphic designing</option>
     </select>
     </div>
     <br>
     <div class="form-group">
     <label for="PR">Previous qualification:</label>
     <input type="text" name="Previous qualification:" id="PR" placeholder="Enter your last qualification">
       </div>
       <br>
       <div class="form-group">
     <label for="%">Marks / percentage:</label>
     <input type="number" name="Marks / percentage" id="%" placeholder="Enter your marks obtained">
     </div>
     <br>
     </fieldset>
<fieldset>
    <legend>Address</legend>
    <div class="form-group">
      <label for="City">City:</label>
     <input type="text" name="City:" id="City" placeholder="Enter your city">
      </div>
      <br>
      <div class="form-group">
      <label for="Address">Full Address:</label>
     <textarea name="Full Address" id="Address" rows="7" placeholder="Enter your address"></textarea>
     </div>
    </fieldset>
  <button type="submit">Submit Application</button>
    </form>
    </div>
</body>
</html>
